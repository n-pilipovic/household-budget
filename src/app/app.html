<router-outlet></router-outlet>

<!-- App update prompt — fires when the service worker has installed a
     newer version. Bottom of the screen so it doesn't cover the app bar.
     Sticks until the user taps Update or Later (this-session dismiss). -->
@if (updates.showPrompt()) {
  <div
    role="status"
    aria-live="polite"
    class="fixed inset-x-0 bottom-4 z-50 mx-auto max-w-md px-4 pointer-events-none">
    <div class="pointer-events-auto rounded-md bg-on-bg text-bg shadow-xl px-4 py-3 flex items-center gap-3">
      <span class="size-9 rounded-full bg-brand-500/25 grid place-items-center shrink-0">
        <svg class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 0 1-15.36 6.36M3 12a9 9 0 0 1 15.36-6.36"/>
          <path d="M21 4v5h-5M3 20v-5h5"/>
        </svg>
      </span>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold">New version available</p>
        <p class="text-xs opacity-80">Tap update to refresh — your changes are saved.</p>
      </div>
      <button
        type="button"
        (click)="updates.dismiss()"
        class="text-xs uppercase tracking-wide font-semibold opacity-80 hover:opacity-100 px-2 py-1"
        aria-label="Dismiss update prompt">
        Later
      </button>
      <button
        type="button"
        (click)="updates.applyUpdate()"
        class="text-xs uppercase tracking-wide font-bold bg-bg text-on-bg px-3 py-1.5 rounded-md hover:opacity-90 transition"
        aria-label="Apply update and reload">
        Update
      </button>
    </div>
  </div>
}
